apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend-deployment

spec:
  replicas: 2

  strategy:
    type: RollingUpdate

  selector:
    matchLabels:
      app: frontend

  template:

    metadata:
      labels:
        app: frontend

    spec:
      containers:

        - name: frontend-container

          image: homeease-frontend:latest

          imagePullPolicy: Never

          ports:
            - containerPort: 80

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"

            limits:
              cpu: "250m"
              memory: "256Mi"

          livenessProbe:
            httpGet:
              path: /health
              port: 80

            initialDelaySeconds: 15

          readinessProbe:
            httpGet:
              path: /health
              port: 80

            initialDelaySeconds: 5

          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false